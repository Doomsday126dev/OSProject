<!doctype html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Trade List Matcher</title><link rel="stylesheet" href="styles.css"></head><body><main id="app"><h1>Trade List Matcher</h1><p>Load a CSV-style trade grid, search users, compare lists, and export edits.</p><section><input id="sheetId" placeholder="Sheet ID"><input id="tabName" value="WISHLIST"><button id="loadSheetBtn">Load Sheet</button></section><section><textarea id="csvPaste" placeholder="Paste CSV"></textarea><button id="parseCsvBtn">Parse CSV</button><input id="csvFile" type="file" accept=".csv"></section><section><input id="searchInput" placeholder="Search"><select id="userSelect"></select><select id="statusFilter"><option value="">All</option><option>H</option><option>M</option><option>L</option></select><button id="clearFiltersBtn">Clear</button></section><section><h2 id="profileTitle">Profile</h2><div id="profileCount"></div><div id="profileList"></div></section><section><h2>Compare</h2><select id="compareA"></select><select id="compareB"></select><div id="compareResults"></div></section><section><h2>Add / Export</h2><input id="newUserName" placeholder="New user"><button id="addUserBtn">Add user</button><input id="newPokemonName" placeholder="New Pokemon"><input id="newPokemonForm" placeholder="Form"><button id="addPokemonBtn">Add row</button><button id="exportCsvBtn">Export CSV</button><button id="exportJsonBtn">Export JSON</button><button id="resetLocalBtn">Reset</button></section></main><div id="toast"></div><script src="app.js"></script></body></html>
